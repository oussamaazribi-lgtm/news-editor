<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ستوديو الأخبار الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&family=Almarai:wght@400;700;800&family=Tajawal:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #0ea5e9; 
            --accent-glow: rgba(14, 165, 233, 0.3);
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(14, 165, 233, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .setting-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .pos-btn {
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .pos-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .upload-zone {
            background: rgba(15, 23, 42, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            transition: 0.4s;
        }

        .preview-glow {
            position: relative;
        }
        .preview-glow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--accent), #6366f1, var(--accent));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(10px);
        }
    </style>
</head>
<body class="p-4 lg:p-12">

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-10">
        
        <div class="w-full lg:w-3/5 flex flex-col">
            <div class="mb-8 flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-black tracking-tight text-white flex items-center gap-3">
                        <div class="w-2 h-10 bg-sky-500 rounded-full animate-pulse"></div>
                        ستوديو الأخبار
                    </h1>
                </div>
            </div>

            <div class="preview-glow">
                <div class="glass-card overflow-hidden relative group">
                    <canvas id="mainCanvas" class="w-full h-full object-contain cursor-crosshair transition-transform duration-500"></canvas>
                </div>
            </div>
            
            <div class="mt-8 flex gap-4">
                <button id="downloadBtn" class="flex-[3] relative overflow-hidden group bg-sky-500 hover:bg-sky-400 text-white font-black py-5 rounded-2xl transition-all shadow-lg transform active:scale-95 flex items-center justify-center gap-3">
                    <span>حفظ التصميم النهائي</span>
                </button>
                <button id="resetBtn" class="flex-1 bg-slate-800 hover:bg-red-500/20 hover:text-red-500 text-slate-400 rounded-2xl border border-slate-700 transition-all flex items-center justify-center">
                    إعادة ضبط
                </button>
            </div>
        </div>

        <div class="w-full lg:w-2/5 space-y-6 lg:max-h-[90vh] lg:overflow-y-auto pr-2">
            
            <div class="glass-card p-6">
                <h3 class="font-black text-sky-400 mb-6 flex items-center gap-2">
                    <span class="bg-sky-500/20 px-2 py-1 rounded text-xs">01</span> المحتوى
                </h3>
                <textarea id="fullText" rows="3" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-slate-700 text-white focus:border-sky-500 outline-none transition-all resize-none mb-4"></textarea>
                <input type="text" id="sourceText" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-slate-700 text-white outline-none focus:border-sky-500" placeholder="المصدر">
            </div>

            <div class="glass-card p-6">
                <h3 class="font-black text-sky-400 mb-6 flex items-center gap-2">
                    <span class="bg-sky-500/20 px-2 py-1 rounded text-xs">02</span> الوسائط
                </h3>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <label class="cursor-pointer">
                        <div class="upload-zone p-5 rounded-2xl text-center">رفع الخلفية</div>
                        <input type="file" id="bgInput" class="hidden" accept="image/*">
                    </label>
                    <label class="cursor-pointer">
                        <div class="upload-zone p-5 rounded-2xl text-center">رفع الشعار</div>
                        <input type="file" id="logoInput" class="hidden" accept="image/*">
                    </label>
                </div>
                <div class="grid grid-cols-4 gap-2 mb-4">
                    <button class="pos-btn p-3 rounded-lg text-xs" data-pos="TL">أعلى-يمين</button>
                    <button class="pos-btn p-3 rounded-lg text-xs" data-pos="TR">أعلى-يسار</button>
                    <button class="pos-btn p-3 rounded-lg text-xs" data-pos="BL">أسفل-يمين</button>
                    <button class="pos-btn p-3 rounded-lg text-xs" data-pos="BR">أسفل-يسار</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="font-black text-sky-400 mb-6 flex items-center gap-2">
                    <span class="bg-sky-500/20 px-2 py-1 rounded text-xs">03</span> التنسيق
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400 block mb-2">حجم الخط</label>
                        <input type="range" id="fontSize" min="30" max="150" value="65" class="w-full">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-2">موقع النص (Y)</label>
                        <input type="range" id="textY" min="200" max="1000" value="880" class="w-full">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-2">لون الهوية</label>
                        <input type="color" id="accentColor" value="#0ea5e9" class="w-full h-10 rounded-lg bg-transparent border-none cursor-pointer">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1080; canvas.height = 1080;

        let state = {
            fullText: "عاجل: تم تحديث الموقع بنجاح وإصلاح كافة أخطاء العرض لضمان أفضل تجربة للمستخدم",
            sourceText: "الأخبار الملاطية",
            fontSize: 65,
            textY: 880,
            lineHeight: 130,
            fontFamily: "'Cairo', sans-serif",
            accentColor: "#0ea5e9",
            gradOpacity: 90,
            logoSize: 180,
            logoPos: "TL",
            logoOpacity: 100,
            bgImg: null,
            logoImg: null
        };

        function isRTL(text) { return /[\u0591-\u07FF]/.test(text); }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.bgImg) {
                const s = Math.max(canvas.width / state.bgImg.width, canvas.height / state.bgImg.height);
                ctx.drawImage(state.bgImg, (canvas.width-state.bgImg.width*s)/2, (canvas.height-state.bgImg.height*s)/2, state.bgImg.width*s, state.bgImg.height*s);
            }

            const grad = ctx.createLinearGradient(0, canvas.height * 0.3, 0, canvas.height);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, `rgba(0,0,0,${state.gradOpacity/100})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.logoImg) {
                let lx = 60, ly = 60; const size = parseInt(state.logoSize);
                if(state.logoPos === "TR") lx = canvas.width - size - 60;
                if(state.logoPos === "BL") { lx = 60; ly = canvas.height - size - 60; }
                if(state.logoPos === "BR") { lx = canvas.width - size - 60; ly = canvas.height - size - 60; }
                ctx.save(); ctx.globalAlpha = state.logoOpacity/100;
                ctx.drawImage(state.logoImg, lx, ly, size, size); ctx.restore();
            }

            const padding = 80;
            const maxWidth = canvas.width - (padding * 2);
            const isRight = isRTL(state.fullText);
            ctx.textAlign = isRight ? 'right' : 'left';
            ctx.font = `900 ${state.fontSize}px 'Cairo'`;
            
            const words = state.fullText.split(/\s+/);
            let lines = []; let curL = []; let tempT = "";
            words.forEach((w, i) => {
                let testT = tempT + (tempT ? " " : "") + w;
                if(ctx.measureText(testT).width > maxWidth && i > 0) {
                    lines.push(curL); curL = [w]; tempT = w;
                } else { curL.push(w); tempT = testT; }
            });
            lines.push(curL);

            let curY = parseInt(state.textY);
            for (let i = lines.length - 1; i >= 0; i--) {
                let curX = isRight ? (canvas.width - padding) : padding;
                lines[i].forEach((word, j) => {
                    ctx.fillStyle = (i === 0 && j < 2) ? state.accentColor : 'white';
                    ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 15;
                    ctx.fillText(word, curX, curY);
                    const wWidth = ctx.measureText(word + " ").width;
                    if(isRight) curX -= wWidth; else curX += wWidth;
                });
                curY -= state.lineHeight;
            }

            // Footer
            const fy = canvas.height - 90;
            ctx.shadowBlur = 0; ctx.fillStyle = 'white';
            ctx.font = "bold 32px 'Cairo'";
            if(isRight) {
                ctx.textAlign = 'right'; ctx.fillText(state.sourceText, canvas.width - padding - 40, fy);
                ctx.fillStyle = state.accentColor; ctx.fillRect(canvas.width - padding - 20, fy - 25, 10, 10);
            } else {
                ctx.textAlign = 'left'; ctx.fillText(state.sourceText, padding + 40, fy);
                ctx.fillStyle = state.accentColor; ctx.fillRect(padding + 10, fy - 25, 10, 10);
            }
        }

        const binders = ['fullText', 'sourceText', 'fontSize', 'textY', 'accentColor'];
        binders.forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                state[id] = e.target.value; render();
            });
        });

        document.querySelectorAll('.pos-btn').forEach(btn => {
            btn.onclick = () => {
                state.logoPos = btn.dataset.pos;
                document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                render();
            };
        });

        document.getElementById('bgInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { state.bgImg = img; render(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('logoInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { state.logoImg = img; render(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('downloadBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `news_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        };

        window.onload = render;
    </script>
</body>
</html>
